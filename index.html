<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Colour Match — Cartoon Game (Prototype)</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* small fallback so page opens even if CSS file missing */
  </style>
</head>
<body>
  <main class="container">
    <h1>Colour Match — Cartoon Game</h1>
    <div id="game">
      <div id="character-panel">
        <img id="char-image" src="" alt="character" />
        <div id="overlay" class="overlay"></div>
        <div id="char-caption" class="char-caption">Loading character…</div>
      </div>
      <div id="controls">
        <div id="instructions" class="instructions">Match the greyed-out region by adjusting Hue, Saturation, and Contrast.</div>
        <div class="preview">
          <div>Preview</div>
          <div id="swatch" class="swatch"></div>
        </div>
        <div class="sliders">
          <label>Hue: <span id="hueVal">180</span>
            <input id="hue" type="range" min="0" max="360" value="180" />
          </label>
          <label>Saturation: <span id="satVal">50%</span>
            <input id="sat" type="range" min="0" max="100" value="50" />
          </label>
          <label>Contrast (affects lightness): <span id="conVal">0</span>
            <input id="con" type="range" min="-50" max="50" value="0" />
          </label>
        </div>
        <div class="actions">
          <button id="submit">Submit</button>
          <div id="score">Score: —</div>
        </div>
      </div>
    </div>
    <div id="status"></div> 
  </main>
  <script src="app.js"></script>
</body>
</html>
